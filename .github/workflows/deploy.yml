name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish -c Release -o release

      # IMPORTANT: base path for project pages
      - name: Rewrite base href
        run: |
          sed -i 's/<base href="\/" \/>/<base href="\/TestTypingSpeeds.github.io\/" \/>/g' release/wwwroot/index.html

      # IMPORTANT: disable Jekyll so _framework files are served
      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      # SPA routing fix (refresh on /typing etc.)
      - name: Add 404 for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
