name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # If your .csproj is in a subfolder, replace the publish line with:
      # dotnet publish ./YourFolder/YourProject.csproj -c Release -o release
      - name: Publish
        run: dotnet publish -c Release -o release

      # IMPORTANT: GitHub Pages project site base path is /<repo>/
      - name: Rewrite base href
        run: |
          sed -i 's/<base href="\/" \/>/<base href="\/TestTypingSpeeds.github.io\/" \/>/g' release/wwwroot/index.html

      # IMPORTANT: serve Blazor’s _framework folder on GitHub Pages
      - name: Disable Jekyll
        run: touch release/wwwroot/.nojekyll

      # Fix refresh/deep-links like /typing
      - name: SPA routing fallback
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
